<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Скидання пароля - GiftGuide</title>
    <style>
        body { font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f5f5f5; }
        .container { width: 350px; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 10px 20px; background: #ff5790; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #e01f59; }
        .message { margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>
<div class="container">
    <h2>Встановіть новий пароль</h2>
    <input type="password" id="password" placeholder="Новий пароль">
    <input type="password" id="confirm" placeholder="Підтвердіть пароль">
    <button onclick="resetPassword()">Зберегти</button>
    <div id="message" class="message"></div>
</div>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    async function resetPassword() {
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirm').value;
        if (!password || password !== confirm) {
            alert('Паролі не співпадають або порожні');
            return;
        }
        try {
            const res = await fetch('http://localhost:5000/api/auth/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, newPassword: password })
            });
            const data = await res.json();
            if (res.ok) {
                document.getElementById('message').innerHTML = '<span style="color:green;">Пароль змінено! Зараз ви будете перенаправлені на сайт...</span>';
                setTimeout(() => window.location.href = 'http://localhost:5500/index.html', 3000);
            } else {
                document.getElementById('message').innerHTML = '<span style="color:red;">' + data.message + '</span>';
            }
        } catch (err) {
            document.getElementById('message').innerHTML = '<span style="color:red;">Помилка з\'єднання</span>';
        }
    }
</script>
</body>
</html>
